# Cloud Build config for deploying to Cloud Run
# Usage:
#   gcloud builds submit --config cloudbuild.yaml \
#     --substitutions=_SUPABASE_URL="https://hjpqwtjfcsvfeeghrpyi.supabase.co",_SUPABASE_ANON_KEY="your-key" \
#     .

substitutions:
  _SUPABASE_URL: ''
  _SUPABASE_ANON_KEY: ''

steps:
  # Build the Docker image with Supabase env vars
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg=VITE_SUPABASE_URL=${_SUPABASE_URL}'
      - '--build-arg=VITE_SUPABASE_ANON_KEY=${_SUPABASE_ANON_KEY}'
      - '-t'
      - 'gcr.io/$PROJECT_ID/gke-feedback-portal'
      - '.'

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/gke-feedback-portal']

  # Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'gke-feedback-portal'
      - '--image=gcr.io/$PROJECT_ID/gke-feedback-portal'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=256Mi'
      - '--max-instances=3'

images:
  - 'gcr.io/$PROJECT_ID/gke-feedback-portal'
