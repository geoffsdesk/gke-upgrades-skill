# Cloud Build config for deploying to Cloud Run
# Usage: gcloud builds submit --config portal/cloudbuild.yaml portal/

steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/gke-feedback-portal', '.']

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/gke-feedback-portal']

  # Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'gke-feedback-portal'
      - '--image=gcr.io/$PROJECT_ID/gke-feedback-portal'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=256Mi'
      - '--max-instances=3'

images:
  - 'gcr.io/$PROJECT_ID/gke-feedback-portal'
