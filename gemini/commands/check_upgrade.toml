name = "gke:check"
description = "Run a pre-upgrade health check on a GKE cluster. Validates version availability, API deprecations, PDB readiness, and resource capacity."

[prompt]
text = """
Perform a comprehensive pre-upgrade health check for GKE cluster '{{cluster_name}}' in zone/region '{{location}}'.

Steps:
1. Get the current cluster version and release channel
2. Check available versions in the cluster's release channel
3. Identify the next target version (sequential minor upgrade)
4. Scan for deprecated API usage that would break on the target version
5. Check PDB configurations that could block node drains
6. Verify resource capacity for surge nodes
7. Check for bare pods that won't reschedule
8. Review admission webhook configurations for potential issues

Output a risk assessment:
- GREEN: No blocking issues found, safe to proceed
- YELLOW: Issues found that should be addressed before upgrading
- RED: Critical blockers that must be resolved first

Include specific remediation commands for any YELLOW or RED items.
"""

[prompt.args]
cluster_name = { description = "GKE cluster name", required = true }
location = { description = "Zone or region (e.g., us-central1-a)", required = true }
